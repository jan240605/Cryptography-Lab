<!DOCTYPE html>
<html>
<head>
<title>Crypto Project</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    text-align:center;
    padding-top:120px;
    color:white;
}
.card{
    background:white;
    color:black;
    width:400px;
    margin:auto;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
a{
    display:block;
    margin:20px;
    padding:12px;
    text-decoration:none;
    background:#667eea;
    color:white;
    border-radius:8px;
}
a:hover{
    background:#5a67d8;
}
</style>
</head>
<body>

<div class="card">
<h2>🔐 Cryptography Algorithms</h2>
<a href="/aes">AES-128 Algorithm</a>
<a href="/des">DES Algorithm</a>
</div>

</body>
</html>
