<!DOCTYPE html>
<html>
<head>
    <title>Euler Totient Theorem</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #185a9d;
        }

        form {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #185a9d;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #123d73;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f8ff;
            border-left: 6px solid #185a9d;
            border-radius: 10px;
        }

        .steps {
            margin-top: 20px;
        }

        .steps ul {
            line-height: 1.8;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #185a9d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .back-btn:hover {
            background: #123d73;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Euler Totient Theorem</h1>

    <form method="post">
        <input name="number" type="number" placeholder="Enter a positive integer" required>
        <button type="submit">Calculate φ(n)</button>
    </form>

    {% if error %}
    <p style="color:red; text-align:center;">{{ error }}</p>
    {% endif %}

    {% if result %}
    <div class="result">
        <h3>Result:</h3>
        <p>φ({{ request.form.number }}) = <strong>{{ result }}</strong></p>
    </div>

    <div class="steps">
        <h3>Calculation Steps:</h3>
        <ul>
        {% for s in steps %}
            <li>{{ s }}</li>
        {% endfor %}
        </ul>
    </div>
    {% endif %}

    <a href="/" class="back-btn">⬅ Back to Home</a>
</div>

</body>
</html>
