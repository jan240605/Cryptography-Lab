<!DOCTYPE html>
<html>
<head>
    <title>Primitive Roots Theorem</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f953c6, #b91d73);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 850px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #b91d73;
        }

        form {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            width: 220px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #b91d73;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #8f145a;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #fdf2f8;
            border-left: 6px solid #b91d73;
            border-radius: 10px;
        }

        .steps {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .steps ul {
            line-height: 1.8;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #b91d73;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .back-btn:hover {
            background: #8f145a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Primitive Roots Theorem</h1>

    <form method="post">
        <input name="number" type="number" placeholder="Enter a prime number" required>
        <button type="submit">Find Primitive Roots</button>
    </form>

    {% if error %}
    <p style="color:red; text-align:center;">{{ error }}</p>
    {% endif %}

    {% if roots %}
    <div class="result">
        <h3>Primitive Roots:</h3>
        <p>{{ roots }}</p>
        <p><strong>Total Count:</strong> {{ roots|length }}</p>
    </div>

    <div class="steps">
        <h3>Calculation Steps:</h3>
        <ul>
        {% for s in steps %}
            <li>{{ s }}</li>
        {% endfor %}
        </ul>
    </div>
    {% endif %}

    <a href="/" class="back-btn">⬅ Back to Home</a>
</div>

</body>
</html>
